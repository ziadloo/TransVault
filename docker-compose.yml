version: '3.8'

services:
  transvault:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transvault
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - DATABASE_PATH=/config/transvault.db
      - LIBVA_DRIVER_NAME=iHD # Intel Media Driver
    volumes:
      - ./config:/config           # Application state and configuration database
      - ./library:/library         # Path to your movie folder
      - ./vault:/vault             # Temporary staging folder for originals
      - ./workdir:/workdir         # Temp transcoding workspace (SSD recommended)
    devices:
      - /dev/dri:/dev/dri           # Intel QuickSync / VAAPI Hardware Acceleration
